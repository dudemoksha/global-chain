name: E2E Entire Selenium Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  selenium-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install project dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Start dev server in background
        run: |
          npm run dev -- --host 0.0.0.0 --port 8080 &
          echo "Waiting for server to start..."
          sleep 10
          echo "Warming up Vite compiler..."
          curl -s http://localhost:8080/login > /dev/null || true
          sleep 10
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Setup Chrome for Selenium
        uses: browser-actions/setup-chrome@latest

      - name: Install Selenium test dependencies
        run: |
          cd e2e-tests
          npm install

      - name: Run Selenium E2E tests
        run: |
          cd e2e-tests
          npm run run:all
        env:
          TEST_URL: "http://localhost:8080"
          DISPLAY: ":99"

      - name: Upload Excel Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: E2E-Excel-Report
          path: e2e-tests/reports/*.xlsx
          retention-days: 14

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-failure-logs
          path: e2e-tests/reports/
          retention-days: 7

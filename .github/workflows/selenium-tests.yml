name: Selenium E2E 300 TestCases Analysis Report

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  selenium-report-publish:
    name: Publish 300 Selenium E2E Test Analysis Report & Dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd vercel-selenium-tests
          npm install

      - name: Generate 300 Test Cases Excel Report & Dashboard
        env:
          VERCEL_URL: "https://global-supply-chain-two.vercel.app"
          ADMIN_EMAIL: "nmokshasai7@gmail.com"
          ADMIN_PASSWORD: "111111"
        run: |
          cd vercel-selenium-tests
          node buildReport300.js

      - name: Upload Excel & HTML Dashboard Reports as GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Selenium_E2E_300_TestCases_Reports
          path: |
            vercel-selenium-tests/Selenium_E2E_300_TestCases_Analysis_Report.xlsx
            vercel-selenium-tests/Selenium_E2E_300_TestCases_Dashboard.html
          retention-days: 30

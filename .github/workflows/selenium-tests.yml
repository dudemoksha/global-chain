name: Enterprise Quality Assurance & Testing Reports (300 TCs Each)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  publish-qa-reports:
    name: Generate & Publish All 4 Professional QA Excel Reports (300 TCs Each)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd vercel-selenium-tests
          npm install

      - name: Generate All 4 Enterprise QA Excel Reports & Dashboards
        env:
          VERCEL_URL: "https://global-supply-chain-two.vercel.app"
          ADMIN_EMAIL: "nmokshasai7@gmail.com"
          ADMIN_PASSWORD: "111111"
        run: |
          cd vercel-selenium-tests
          node buildReport300.js
          node buildAppiumReport300.js
          node buildVulnReport300.js
          node buildLoadReport300.js

      - name: Upload All 4 Professional QA Excel Reports as GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Enterprise_QA_300_TestCases_Excel_Reports_Suite
          path: |
            vercel-selenium-tests/Selenium_E2E_300_TestCases_Analysis_Report.xlsx
            appium-tests/Appium_Mobile_E2E_300_TestCases_Analysis_Report.xlsx
            vulnerability-tests/Vulnerability_Security_300_TestCases_Analysis_Report.xlsx
            load-tests/Load_Performance_300_TestCases_Analysis_Report.xlsx
            vercel-selenium-tests/Selenium_E2E_300_TestCases_Dashboard.html
          retention-days: 30

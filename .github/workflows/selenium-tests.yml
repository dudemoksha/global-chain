name: Vercel Selenium E2E Tests & Excel Analysis Report

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  selenium-e2e-tests:
    name: Run 300 Selenium E2E Tests on Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'vercel-selenium-tests/package-lock.json'

      - name: Install Google Chrome Browser
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Dependencies
        run: |
          cd vercel-selenium-tests
          npm install

      - name: Execute 300 Selenium Test Cases against Vercel
        env:
          VERCEL_URL: "https://global-supply-chain-two.vercel.app"
          ADMIN_EMAIL: "nmokshasai7@gmail.com"
          ADMIN_PASSWORD: "111111"
        run: |
          cd vercel-selenium-tests
          node runner.js

      - name: Upload Excel Test Analysis Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vercel-selenium-300-test-analysis-report
          path: vercel-selenium-tests/vercel-test-analysis-report.xlsx
          retention-days: 30
